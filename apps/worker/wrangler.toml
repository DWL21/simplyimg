name = "simplyimg-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "api.simplyimg.com/*", zone_name = "simplyimg.com" }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[[d1_databases]]
binding = "DB"
database_name = "simplyimg-db"
database_id = "fdf2d0ad-460c-473f-8af2-9e7d0b54f657"

[vars]
MAX_UPLOAD_BYTES = "31457280"
MAX_DOCUMENT_UPLOAD_BYTES = "52428800"
DAILY_FREE_LIMIT = "10"
DAILY_LOGGED_LIMIT = "50"
